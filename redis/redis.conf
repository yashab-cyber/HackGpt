# HackGPT Redis configuration (redis:7-alpine)
# Note: the compose command starts redis with
#   redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
# Those CLI flags override this file, so the password is NOT stored here.
# Set it via the REDIS_PASSWORD env var instead.

# Listen on all interfaces inside the container network.
bind 0.0.0.0
protected-mode no
port 6379

# Append-only persistence (matches the compose --appendonly yes flag).
appendonly yes
appendfsync everysec
dir /data
