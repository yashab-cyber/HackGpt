# HackGPT Nginx reverse proxy (nginx:alpine)
# Routes /api/ to the API server (8000) and everything else to the
# web dashboard (8080) on the hackgpt-app container.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    upstream hackgpt_api {
        server hackgpt-app:8000;
    }

    upstream hackgpt_web {
        server hackgpt-app:8080;
    }

    server {
        listen 80;
        server_name _;

        # API server
        location /api/ {
            proxy_pass http://hackgpt_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Web dashboard
        location / {
            proxy_pass http://hackgpt_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for the realtime dashboard
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
